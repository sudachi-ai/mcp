# fly.toml app configuration file generated for sudachi-mcp on 2026-02-24T13:21:19Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sudachi-mcp'
primary_region = 'sjc'

[build]

[env]
  MCP_PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
